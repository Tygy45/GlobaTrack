<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maper World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 400px;
            margin: 20px 0;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .route-info {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
        }

    </style>
</head>
<body class="bg-image text-white" style="background-image: url('static/img/bg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; min-height: 100vh; margin: 0;">

<header class="py-3">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Главная</a></li>
                <li class="nav-item"><a href="/support" class="nav-link">Поддержка</a></li>
                <li class="nav-item"><a href="/profile" class="nav-link">Маршруты пользователей</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <input type="text" id="header-search-input" class="form-control" placeholder="Поиск места..." style="width: 250px;">
                <button id="header-search-btn" class="btn btn-primary">Найти</button>
            </div>
        </div>
    </div>
</header>

<main class="container text-center py-5">
    <img class="d-block mx-auto mb-4" src="static/img/logo.jpg" alt="Логотип" width="150" height="200">
    <h1 class="display-5 fw-bold">GlobeTrack</h1>
    <h2 class="display-6">Карты</h2>
    <h2 class="display-6">Наш сайт предлагает вам составить свое путешествие!</h2>
</main>

<!-- Контейнер для кнопок -->
<div class="button-container">
    <button id="toggle-route-mode" class="btn btn-info">Режим: Прямые линии</button>
    <button id="clear-markers" class="btn btn-danger">Удалить все метки</button>
    <button id="log-markers" class="btn btn-success">Вывести метки в консоль</button>
    <button id="save-to-db" class="btn btn-warning">Сохранить маршрут</button>
</div>

<!-- Информация о маршруте -->
<div class="route-info">
    <h5>Информация о маршруте</h5>
    <p><strong>Длина маршрута:</strong> <span id="route-length">0 км</span></p>
    <p><strong>Количество точек:</strong> <span id="markers-count">0</span></p>
</div>

<!-- Контейнер для карты -->
<div id="map"></div>

<footer class="container text-center py-5">
    <h1 class="display-5 fw-bold">Мы используем Яндекс Карты для более удобной работы!</h1>
</footer>

<!-- Подключаем API Яндекс Карт -->
<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
<script>
    ymaps.ready(init);

    let myMap;
    let routeLines = [];
    let sessionMarkers = [];
    let useRoads = false;
    let currentRoute = null;
    let totalDistance = 0;

    function init() {
        myMap = new ymaps.Map("map", {
            center: [55.76, 37.64],
            zoom: 10
        });

        myMap.events.add('click', function (e) {
            var coords = e.get('coords');
            var myPlacemark = createPlacemark(coords);
            myMap.geoObjects.add(myPlacemark);
            sessionMarkers.push({ coords: coords, name: 'Новая метка', photo: null });
            connectMarkers();
            updateRouteInfo();
        });

        document.getElementById('toggle-route-mode').addEventListener('click', function () {
            useRoads = !useRoads;
            this.textContent = useRoads ? 'Режим: По дорогам' : 'Режим: Прямые линии';
            this.className = useRoads ? 'btn btn-success' : 'btn btn-info';
            if (sessionMarkers.length > 1) {
                connectMarkers();
            }
        });

        document.getElementById('header-search-btn').addEventListener('click', function () {
            var query = document.getElementById('header-search-input').value;
            if (query) {
                searchPlace(query);
            }
        });

        document.getElementById('header-search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                var query = this.value;
                if (query) {
                    searchPlace(query);
                }
            }
        });

        document.getElementById('clear-markers').addEventListener('click', function () {
            myMap.geoObjects.removeAll();
            sessionMarkers = [];
            totalDistance = 0;
            currentRoute = null;
            updateRouteInfo();
            alert('Все метки удалены!');
        });

        document.getElementById('log-markers').addEventListener('click', function () {
            console.log('Данные о метках в текущей сессии:');
            sessionMarkers.forEach((marker, index) => {
                console.log(`Метка ${index + 1}: Название - "${marker.name}", Координаты - [${marker.coords}], Фото: ${marker.photo ? marker.photo : 'Нет фото'}`);
            });
            alert('Данные выведены в консоль!');
        });

        document.getElementById('save-to-db').addEventListener('click', function () {
            if (sessionMarkers.length === 0) {
                alert('Добавьте хотя бы одну точку на карту!');
                return;
            }

            var routeName = prompt('Введите название маршрута:', 'Мой маршрут');
            if (!routeName) {
                return;
            }

            fetch('/save-markers', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    markers: sessionMarkers,
                    routeName: routeName,
                    routeLength: totalDistance,
                    useRoads: useRoads
                }),
            })
            .then(response => response.json())
            .then(data => {
                alert('Маршрут "' + routeName + '" успешно сохранен!');
                myMap.geoObjects.removeAll();
                sessionMarkers = [];
                totalDistance = 0;
                currentRoute = null;
                updateRouteInfo();
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Произошла ошибка при сохранении данных.');
            });
        });
    }

    function createPlacemark(coords, defaultName = 'Новая метка') {
        var myPlacemark = new ymaps.Placemark(coords, {
            hintContent: 'Нажмите, чтобы изменить название',
            balloonContent: `
                <div style="padding: 10px;">
                    <input type="text" id="marker-name" placeholder="Введите название метки" value="${defaultName}" style="width: 100%; margin-bottom: 10px;">
                    <input type="file" id="marker-photo" accept="image/*" style="width: 100%; margin-bottom: 10px;">
                    <button onclick="saveMarkerName([${coords}])" style="width: 100%;">Сохранить</button>
                </div>
            `
        }, {
            preset: 'islands#redDotIcon'
        });

        myPlacemark.events.add('click', function () {
            myPlacemark.balloon.open();
        });

        return myPlacemark;
    }

    window.saveMarkerName = function (coords) {
        var name = document.getElementById('marker-name').value;
        var photoInput = document.getElementById('marker-photo');
        var photo = null;

        if (photoInput.files && photoInput.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                photo = e.target.result;
                var sessionMarkerIndex = sessionMarkers.findIndex(marker => marker.coords[0] === coords[0] && marker.coords[1] === coords[1]);
                if (sessionMarkerIndex !== -1) {
                    sessionMarkers[sessionMarkerIndex].name = name;
                    sessionMarkers[sessionMarkerIndex].photo = photo;
                }
                alert('Название метки и фото сохранены!');
            };
            reader.readAsDataURL(photoInput.files[0]);
        } else if (name) {
            var sessionMarkerIndex = sessionMarkers.findIndex(marker => marker.coords[0] === coords[0] && marker.coords[1] === coords[1]);
            if (sessionMarkerIndex !== -1) {
                sessionMarkers[sessionMarkerIndex].name = name;
            }
            alert('Название метки сохранено!');
        } else {
            alert('Введите название метки!');
        }
    };

    function searchPlace(query) {
        if (!query || query.trim() === '') {
            alert('Введите адрес, улицу или название заведения');
            return;
        }

        var searchBtn = document.getElementById('header-search-btn');
        var originalText = searchBtn.textContent;
        searchBtn.textContent = 'Поиск...';
        searchBtn.disabled = true;

        ymaps.geocode(query, {
            results: 1
        }).then(function (res) {
            searchBtn.textContent = originalText;
            searchBtn.disabled = false;

            if (res.geoObjects.getLength() === 0) {
                alert('Место не найдено. Попробуйте другой запрос.');
                return;
            }

            var firstGeoObject = res.geoObjects.get(0);
            var coords = firstGeoObject.geometry.getCoordinates();
            var name = firstGeoObject.getAddressLine();

            myMap.setCenter(coords, 16);

            var myPlacemark = createPlacemark(coords, name);
            myMap.geoObjects.add(myPlacemark);

            sessionMarkers.push({ coords: coords, name: name, photo: null });

            connectMarkers();
            updateRouteInfo();

            document.getElementById('header-search-input').value = '';
        }).catch(function (error) {
            searchBtn.textContent = originalText;
            searchBtn.disabled = false;
            console.error('Ошибка геокодирования:', error);
            alert('Ошибка при поиске места. Проверьте подключение к интернету.');
        });
    }

    function updateRouteInfo() {
        document.getElementById('markers-count').textContent = sessionMarkers.length;
        document.getElementById('route-length').textContent = (totalDistance / 1000).toFixed(2) + ' км';
    }

    function connectMarkers() {
        var markers = sessionMarkers;

        routeLines.forEach(line => myMap.geoObjects.remove(line));
        routeLines = [];
        if (currentRoute) {
            myMap.geoObjects.remove(currentRoute);
            currentRoute = null;
        }

        if (markers.length < 2) {
            totalDistance = 0;
            return;
        }

        if (useRoads) {
            var waypoints = markers.map(m => m.coords);
            
            var multiRoute = new ymaps.multiRouter.MultiRoute({
                referencePoints: waypoints,
                params: {
                    routingMode: 'auto',
                    avoidTrafficJams: false
                }
            }, {
                boundsAutoApply: false,
                wayPointStartIconColor: '#FF0000',
                wayPointFinishIconColor: '#FF0000',
                routeActiveStrokeWidth: 5,
                routeActiveStrokeColor: '#FF0000',
                routeStrokeWidth: 5,
                routeStrokeColor: '#FF0000'
            });

            multiRoute.model.events.add('requestsuccess', function () {
                var activeRoute = multiRoute.getActiveRoute();
                if (activeRoute) {
                    totalDistance = activeRoute.properties.get("distance").value;
                    updateRouteInfo();
                }
            });

            multiRoute.model.events.add('requestfail', function (error) {
                console.error('Ошибка построения маршрута:', error);
                alert('Не удалось построить маршрут по дорогам. Точки слишком далеко от дорог или маршрут невозможен. Переключаюсь на прямые линии.');
                
                useRoads = false;
                document.getElementById('toggle-route-mode').textContent = 'Режим: Прямые линии';
                document.getElementById('toggle-route-mode').className = 'btn btn-info';
                connectMarkers();
            });

            currentRoute = multiRoute;
            myMap.geoObjects.add(multiRoute);
        } else {
            totalDistance = 0;
            for (let i = 1; i < markers.length; i++) {
                var line = new ymaps.Polyline([
                    markers[i - 1].coords,
                    markers[i].coords
                ], {}, {
                    strokeColor: "#FF0000",
                    strokeWidth: 5
                });

                var distance = ymaps.coordSystem.geo.getDistance(
                    markers[i - 1].coords,
                    markers[i].coords
                );
                totalDistance += distance;

                routeLines.push(line);
                myMap.geoObjects.add(line);
            }
            updateRouteInfo();
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
