   <main class="container text-center py-5">
    <h1 class="display-3 fw-bold">Мир Карт</h1>
</main>

    <div class="container mt-5">
        <h2 class="text-center">Вход</h2>
        <form action="/login" method="POST">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Введите email" required>
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль" required>
                <label for="password">Пароль</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <div id="error-message" class="text-danger mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function (event) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                event.preventDefault(); // Остановить отправку формы
                document.getElementById('error-message').textContent = 'Пожалуйста, заполните все обязательные поля.';
            }
        });
    </script>
