   <main class="container text-center py-5">
    <h1 class="display-3 fw-bold">Мир Карт</h1>
</main>

    <div class="container mt-5">
        <h2 class="text-center">Регистрация</h2>
        <form action="/registration" method="POST" enctype="multipart/form-data">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Введите никнейм" required>
                <label for="username">Никнейм</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Введите email" required>
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль" required>
                <label for="password">Пароль</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password2" name="password2" placeholder="Повторите пароль" required>
                <label for="password2">Повторите пароль</label>
<!--            </div>-->
<!--&lt;!&ndash;            <div class="mb-3">&ndash;&gt;-->
<!--                <label for="photo" class="form-label">Загрузите фото (опционально)</label>-->
<!--                <input type="file" class="form-control" id="photo" name="photo" accept="image/*">-->
<!--            </div>-->
            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>
        <div id="error-message" class="text-danger mt-3"></div>
    </div>

    <div class="container mt-5">
        <a href="/login" class="btn btn-success w-100">Войти</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', function (event) {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (!username || !email || !password || !password2) {
                event.preventDefault(); // Остановить отправку формы
                document.getElementById('error-message').textContent = 'Пожалуйста, заполните все обязательные поля.';
            } else if (password !== password2) {
                event.preventDefault();
                document.getElementById('error-message').textContent = 'Пароли не совпадают.';
            }
        });
    </script>
</body>
